name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  dependency-check:
    name: Static dependency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run dependency / orphan check
        run: python3 tests/check_dependencies.py
